<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Registration - AMC Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 20px;
    }

    .register-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 450px;
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 26px;
    }

    .register-header p {
      color: #666;
      font-size: 14px;
    }

    .amc-logo {
      font-size: 36px;
      color: #667eea;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: 'Poppins', Arial, sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .password-strength {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-weight: 400;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 15px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }

    .footer-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .required {
      color: #e74c3c;
    }

    .info-box {
      background: #f0f4ff;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #555;
      border-left: 4px solid #667eea;
    }

    /* --- NAVBAR --- */
    .navbar {
        background: #2563eb;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .navbar h2 {
        color: white;
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
    }

    .navbar ul li a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        font-weight: 500;
        font-size: 15px;
        transition: 0.3s;
        padding: 5px 10px;
        border-radius: 4px;
    }

    .navbar ul li a:hover,
    .navbar ul li a:focus {
        color: #ffd700;
        outline: 2px solid #ffd700;
        outline-offset: 2px;
    }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main Navigation">
    <h2>AMC Portal</h2>
    <ul>
      <li><a href="{{ url_for('home') }}">Home</a></li>
      <li><a href="{{ url_for('about') }}">About</a></li>
      <li><a href="{{ url_for('services') }}">Services</a></li>
      <li><a href="{{ url_for('contact') }}">Contact</a></li>
      <li><a href="{{ url_for('feedback') }}">Feedback</a></li>
    </ul>
  </nav>
  <div class="register-container">
    <div class="register-header">
      <div class="amc-logo">
        <i class="fas fa-id-card"></i>
      </div>
      <h2>Citizen Registration</h2>
      <p>Create your account to book appointments with AMC</p>
    </div>

    <div class="info-box">
      <i class="fas fa-info-circle"></i> All fields marked with <span class="required">*</span> are required
    </div>

    <form method="POST" onsubmit="return validateForm()">
      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number <span class="required">*</span></label>
          <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile" pattern="[0-9]{10}" required>
        </div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address" placeholder="Enter your address">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required>
          <div class="password-strength">Password must be at least 6 characters</div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password <span class="required">*</span></label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the <a href="#" style="color: #667eea;">Terms & Conditions</a></label>
      </div>

      <button type="submit">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="footer-text">
      Already have an account? <a href="{{ url_for('home') }}">Login here</a>
    </div>
  </div>

  <script>
    function validateForm() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;
      const mobile = document.getElementById('mobile').value;

      if (password.length < 6) {
        alert('Password must be at least 6 characters long');
        return false;
      }

      if (password !== confirm) {
        alert('Passwords do not match');
        return false;
      }

      if (mobile.length !== 10 || !/^\d{10}$/.test(mobile)) {
        alert('Please enter a valid 10-digit mobile number');
        return false;
      }

      if (!document.getElementById('terms').checked) {
        alert('Please agree to the Terms & Conditions');
        return false;
      }

      return true;
    }
  </script>
</body>
</html>
